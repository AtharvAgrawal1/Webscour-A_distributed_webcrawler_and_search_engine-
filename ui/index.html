<!DOCTYPE html>
<html>

<head>
<title>WebScour Search Engine</title>

<style>

body{
    font-family: Arial;
    text-align:center;
    margin-top:100px;
}

input{
    width:400px;
    padding:10px;
    font-size:16px;
}

button{
    padding:10px 20px;
    font-size:16px;
}

#results{
    margin-top:40px;
}

.result{
    margin:10px;
}

</style>

</head>

<body>

<h1>WebScour Search</h1>

<input id="query" type="text" placeholder="Enter search query">

<button onclick="search()">Search</button>

<div id="results"></div>

<script>

async function search(){

    let q = document.getElementById("query").value;

    let response = await fetch(
        "http://127.0.0.1:8000/search?q=" + q
    );

    let data = await response.json();

    let resultsHTML = "";

    data.forEach(function(item){

        resultsHTML += `
        <div class="result">
            <b>${item.document}</b>
            <br>
            Score: ${item.score}
        </div>
        `;

    });

    document.getElementById("results").innerHTML = resultsHTML;

}

</script>

</body>
</html>
